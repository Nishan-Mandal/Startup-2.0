permissions:
  contents: write

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
      - develop

name: "Build & Release"

jobs:
  build:
    name: Build & Release
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          architecture: x64

      - name: Verify Flutter Version
        run: flutter --version

      # ✅ Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # ✅ Recreate Firebase config
      - name: Decode google-services.json
        run: |
          echo "${{ secrets.ANDROID_GOOGLE_SERVICES }}" | base64 --decode > android/app/google-services.json

      - name: Decode iOS GoogleService-Info.plist
        run: |
          echo "${{ secrets.IOS_GOOGLE_SERVICE_INFO }}" | base64 --decode > ios/GoogleService-Info.plist

      # ✅ Recreate keystore
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks

      # ✅ Recreate key.properties
      - name: Decode key.properties
        run: |
          echo "${{ secrets.KEY_PROPERTIES_BASE64 }}" | base64 --decode > android/key.properties

      # 🔥 Optional: Debug (remove later)
      # - run: ls -R android

      # ✅ Build APK
      - name: Build APK
        run: flutter build apk --release

      # Build AAB (for Play Store) 
      - run: flutter build appbundle --release

      - name: Disable Swift Package Manager
        run: |
          mkdir -p ios/Flutter
          touch ios/Flutter/DisableSwiftPackageManager

      # ✅ Build iOS (no signing)
      - name: Install CocoaPods dependencies
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Build iOS
        run: |
          flutter build ios --no-codesign
          cd build/ios/iphoneos
          mkdir Payload
          cd Payload
          ln -s ../Runner.app
          cd ..
          zip -r app.ipa Payload

      # ✅ Release artifacts
      - name: Push to Releases
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/apk/release/*,build/app/outputs/bundle/release/*.aab,build/ios/iphoneos/app.ipa"
          tag: v1.0.${{ github.run_number }}
          token: ${{ secrets.GITHUB_TOKEN }}

# push to master, main, develop
# pull request on main master
