name: Build & Release

on:
push:
branches:
- main
- master
- develop
pull_request:
branches:
- main
- master

jobs:
build:
runs-on: macos-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v3

  - name: Setup Java
    uses: actions/setup-java@v3
    with:
      distribution: zulu
      java-version: '21'

  - name: Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      channel: stable

  - name: Install dependencies
    run: flutter pub get

  - name: Decode google-services.json
    run: |
      echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

  - name: Decode keystore
    run: |
      echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks

  - name: Decode key.properties
    run: |
      echo "${{ secrets.KEY_PROPERTIES_BASE64 }}" | base64 --decode > android/key.properties

  - name: Build APK
    run: flutter build apk --release --split-per-abi

  - name: Build iOS
    run: |
      flutter build ios --no-codesign
      cd build/ios/iphoneos
      mkdir Payload
      cd Payload
      ln -s ../Runner.app
      cd ..
      zip -r app.ipa Payload

  - name: Create Release
    uses: ncipollo/release-action@v1
    with:
      artifacts: build/app/outputs/apk/release/*,build/ios/iphoneos/app.ipa
      tag: v1.0.${{ github.run_number }}
      token: ${{ secrets.TOKEN }}
```